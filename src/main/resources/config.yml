# Domyslna metoda sortowania dla nowych graczy
# Dostepne: shift, shift_left, right, left, middle, double
defaultClickType: shift

# Ktore kontenery mozna sortowac
enableInventoryTypeChest: true
enableInventoryTypeEnderChest: true
enableInventoryTypeBarrel: true
enableInventoryTypeShulker: true
enableInventoryTypeDropper: true
enableInventoryTypeDispenser: true
enableInventoryTypePlayer: false

# Wiadomosci
# Uzyj & do kolorow, %container% i %method% jako zmienne.
messages:
  sorted: "&a%container% posortowany!"
  enabled: "&aSortowanie wlaczone! &7Metoda: &e%method%"
  disabled: "&cSortowanie wylaczone!"
  no-permission: "&cKup range &eElite &caby uzywac sortowania!"
  method-set: "&aUstawiono metode sortowania na: &e%method%"
  reloaded: "&aKonfiguracja przeladowana!"
  status-on: "&7Sortowanie: &awlaczone &7| Metoda: &e%method%"
  status-off: "&7Sortowanie: &cwylaczone"
  gui-title: "&8Sortowanie Skrzyn"
  help:
    - "&6=== ChestSorter Pomoc ==="
    - "&e/sortowanie &7- otworz GUI ustawien"
    - "&e/sortowanie on &7- wlacz sortowanie"
    - "&e/sortowanie off &7- wylacz sortowanie"
    - "&e/sortowanie <metoda> &7- ustaw metode sortowania"
    - "&e/sortowanie help &7- pokaz pomoc"
    - "&7Dostepne metody: &eshift&7, &eshift_left&7, &eright&7, &eleft&7, &emiddle&7, &edouble"
