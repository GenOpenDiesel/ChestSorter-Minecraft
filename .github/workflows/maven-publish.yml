name: Build ChestSorter JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Pozwala na ręczne odpalenie akcji z poziomu GitHuba

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Pobranie kodu repozytorium (v4)
    - name: Checkout repository
      uses: actions/checkout@v4

    # Konfiguracja środowiska Java 17 (v4)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # popularna, darmowa dystrybucja Javy
        cache: maven # Przyspiesza budowanie dzięki cache'owaniu zależności Mavena

    # Budowanie projektu i generowanie pliku .jar
    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    # Udostępnienie gotowego pliku .jar jako artefakt do pobrania (v4)
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChestSorter-Plugin
        path: target/ChestSorter-*.jar
        if-no-files-found: error
